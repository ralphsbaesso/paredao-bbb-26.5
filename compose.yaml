# Orquestração de desenvolvimento do PROJETO INTEIRO (backend + frontend).
# Suba o stack a partir da raiz com:  docker compose up   (ou `task up`).
#
# Espelha o backend/compose.yaml (task 006) reaproveitando app/db/redis, e
# acrescenta o serviço `frontend` (Nuxt 4 SSR — task 001). Os atalhos ficam no
# Taskfile.yaml da raiz. O backend/compose.yaml segue válido para trabalhar o
# backend isoladamente.
#
# Valores vêm de um .env local (ver .env.example); os fallbacks `${VAR:-default}`
# mantêm `docker compose up` funcionando mesmo sem .env. Nada de segredos reais aqui.

name: paredao

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    # Publica a Puma no host. O container sempre escuta em 3000 (ver Dockerfile.dev).
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # Rails mescla DATABASE_URL sobre config/database.yml; `db` resolve pela rede do Compose.
      DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-backend_development}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      RAILS_MAX_THREADS: "${RAILS_MAX_THREADS:-5}"
      # Libera o hostname interno do Compose no host authorization do Rails, para
      # que o scrape do Prometheus e o SSR do Nuxt (ambos via http://app:3000)
      # não tomem 403 Blocked host em development.
      RAILS_DEVELOPMENT_HOSTS: "${RAILS_DEVELOPMENT_HOSTS:-app}"
    volumes:
      # Bind-mount do código para hot-reload...
      - ./backend:/rails
      # ...mantendo diretórios geridos pelo container fora do mount do host.
      - bundle:/usr/local/bundle
      - tmp:/rails/tmp
    # `up` já sobe o servidor da API. O ENTRYPOINT prepara o banco antes disto.
    command: ["bin/rails","server","-b","0.0.0.0","-p","3000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-backend_development}"
    volumes:
      # postgres:18 guarda dados em subdir versionado; monte o pai
      # (ver https://github.com/docker-library/postgres/pull/1259).
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-backend_development}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    # Nuxt escuta em 3000 no container; publica em 3001 para não conflitar com a API.
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      # URL da API injetada em runtime (nunca hardcoded). São DUAS bases:
      # - pública: usada pelo browser, precisa ser um host alcançável do host
      #   (a API é publicada em localhost:${APP_PORT:-3000}).
      # - interna: usada no SSR, o servidor Nuxt alcança o backend pela rede
      #   interna do Compose (serviço `app`).
      NUXT_PUBLIC_API_BASE: "${NUXT_PUBLIC_API_BASE:-http://localhost:3000}"
      NUXT_API_BASE_INTERNAL: "${NUXT_API_BASE_INTERNAL:-http://app:3000}"
    volumes:
      # Bind-mount do código para hot-reload...
      - ./frontend:/app
      # ...preservando node_modules e artefatos geridos pelo container.
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt
    depends_on:
      - app

  # --- Observabilidade (task 009) ---------------------------------------------
  # Prometheus faz o scrape das métricas expostas pela API em app:3000/metrics.
  # A configuração de scrape é versionada em infra/monitoring/prometheus/.
  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - app

  # Grafana provisionado como código: data source (Prometheus) e os 3 dashboards
  # vêm de infra/monitoring/grafana/ (nada criado só pela UI). Publica em 3002
  # para não colidir com a API (3000) nem o frontend (3001).
  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pg_data:
  redis_data:
  bundle:
  tmp:
  frontend_node_modules:
  frontend_nuxt:
  prometheus_data:
  grafana_data:
