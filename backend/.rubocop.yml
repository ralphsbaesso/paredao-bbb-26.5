# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

AllCops:
  Exclude:
    - db/schema.rb
Style/StringLiterals:
  Enabled: true
  EnforcedStyle: single_quotes
Style/RedundantSelf:
  Enabled: false
Style/HashSyntax:
  EnforcedShorthandSyntax: never
Style/FormatStringToken:
  Enabled: false
Style/Documentation:
  Enabled: false
Style/AsciiComments:
  Enabled: false
Style/FetchEnvVar:
  Enabled: false
Style/GuardClause:
  Enabled: false

